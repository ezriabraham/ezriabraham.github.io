<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landscape Photography — Places and Travel</title>
  <meta name="description" content="Landscape and travel photography — mountains, deserts, coastlines, and cities from Patagonia, the Atacama Desert, Tanzania, Malaysia, Singapore, and more.">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .gallery-wrap { max-width: 1200px; margin: 0 auto; padding: 0 2.5rem 5rem; }
    .photo-grid { columns: 3 280px; column-gap: 0.75rem; }
    .photo-figure { break-inside: avoid; margin-bottom: 0.75rem; position: relative; overflow: hidden; border-radius: 3px; background: var(--bg2); cursor: pointer; opacity: 0; transform: translateY(20px); transition: opacity 0.55s ease, transform 0.55s ease; }
    .photo-figure.visible { opacity: 1; transform: none; }
    .photo-figure img { width: 100%; display: block; transition: transform 0.6s ease; }
    .photo-figure:hover img { transform: scale(1.04); }
    .photo-cap { position: absolute; inset: 0; background: linear-gradient(transparent 50%, rgba(0,0,0,0.82)); opacity: 0; transition: opacity 0.3s ease; display: flex; flex-direction: column; justify-content: flex-end; padding: 1.25rem; pointer-events: none; }
    .photo-figure:hover .photo-cap { opacity: 1; }
    .photo-cap-title { font-family: var(--font-serif); font-size: 0.95rem; color: #fff; margin-bottom: 0.2rem; }
    .photo-cap-loc   { font-size: 0.72rem; color: rgba(255,255,255,0.65); }
    .lightbox { position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.94); display: none; align-items: center; justify-content: center; padding: 2rem; cursor: zoom-out; }
    .lightbox.open { display: flex; }
    .lb-inner { position: relative; max-width: 90vw; max-height: 88vh; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; cursor: default; }
    .lb-inner img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 3px; }
    .lb-caption { color: rgba(255,255,255,0.65); font-size: 0.82rem; text-align: center; }
    .lb-close { position: fixed; top: 1.5rem; right: 1.5rem; background: none; border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.2s; }
    .lb-close:hover { border-color: rgba(255,255,255,0.6); }
    .gallery-empty { text-align: center; padding: 6rem 2rem; color: var(--text3); border: 1px dashed var(--border2); border-radius: 4px; font-size: 0.9rem; line-height: 2; }
    @media (max-width: 768px) { .gallery-wrap { padding: 0 1.25rem 4rem; } .photo-grid { columns: 2 160px; } }
    @media (max-width: 480px) { .photo-grid { columns: 1; } }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="../index.html" class="nav-logo">Ezri Abraham</a>
    <ul class="nav-links">
      <li><a href="../index.html">About</a></li>
      <li><a href="../science.html">Science</a></li>
      <li><a href="index.html" class="active">Photos</a></li>
      <li><a href="../art/index.html">Art</a></li>
      <li><a href="../music/index.html">Music</a></li>
    </ul>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24"></svg>
    </button>
  </nav>

  <a href="index.html" class="back-link">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Photos
  </a>

  <header class="page-header">
    <span class="page-label">Photos</span>
    <h1>Places</h1>
    <p>Landscape and travel photography.</p>
  </header>

  <div class="gallery-wrap">
    <div class="photo-grid" id="photoGrid"></div>
  </div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
    <div class="lb-inner">
      <img id="lbImg" src="" alt="">
      <div class="lb-caption" id="lbCaption"></div>
    </div>
  </div>

  <footer class="site-footer">
    Ezri Abraham &nbsp;·&nbsp; ezribabraham@gmail.com &nbsp;·&nbsp; Pasadena, CA
  </footer>

  <script src="../assets/js/theme.js"></script>
  <script>
    /*
    ═══════════════════════════════════════════════════════════
    HOW TO ADD PHOTOS
    ───────────────────────────────────────────────────────────
    1. Drop your photo files into:  assets/images/photos/places/
    2. Add an entry to the PHOTOS array below.

    Each entry:
      src    — path to the image file (required)
      alt    — describe WHAT IS IN THE PHOTO for Google image search
               e.g. "Pink salt flats of the Atacama Desert at sunset, Chile"
      title  — short display title shown on hover
      loc    — location / year (optional)

    SEO tip: descriptive filenames help —
      "patagonia-torres-del-paine-sunrise.jpg" beats "IMG_9012.jpg"
    ═══════════════════════════════════════════════════════════
    */

    const PHOTOS = [
      // ← add your entries here
    ];

    const grid = document.getElementById('photoGrid');
    if (PHOTOS.length === 0) {
      grid.innerHTML = '<div class="gallery-empty" style="column-span:all"><strong>No photos yet.</strong><br>Open <code>photos/places.html</code> and add entries to the <code>PHOTOS</code> array.</div>';
    } else {
      const imageObjects = [];
      PHOTOS.forEach((p, i) => {
        const fig = document.createElement('figure');
        fig.className = 'photo-figure';
        fig.style.transitionDelay = (i % 9 * 0.06) + 's';
        fig.innerHTML = `<img src="${p.src}" alt="${p.alt}" loading="lazy"><div class="photo-cap">${p.title ? `<div class="photo-cap-title">${p.title}</div>` : ''}${p.loc ? `<div class="photo-cap-loc">${p.loc}</div>` : ''}</div>`;
        fig.addEventListener('click', () => openLb(p));
        grid.appendChild(fig);
        imageObjects.push({ "@type": "ImageObject", "contentUrl": new URL(p.src, location.href).href, "description": p.alt, "name": p.title || p.alt, "representativeOfPage": i === 0 });
      });
      const ld = document.createElement('script');
      ld.type = 'application/ld+json';
      ld.textContent = JSON.stringify({ "@context": "https://schema.org", "@type": "ImageGallery", "name": "Landscape and Travel Photography", "description": document.querySelector('meta[name="description"]').content, "image": imageObjects });
      document.head.appendChild(ld);
      const io = new IntersectionObserver(entries => { entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } }); }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.photo-figure').forEach(f => io.observe(f));
    }

    const lb = document.getElementById('lightbox'), lbImg = document.getElementById('lbImg'), lbCap = document.getElementById('lbCaption');
    function openLb(p) { lbImg.src = p.src; lbImg.alt = p.alt; lbCap.textContent = [p.title, p.loc].filter(Boolean).join(' · '); lb.classList.add('open'); document.body.style.overflow = 'hidden'; }
    function closeLb() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    document.getElementById('lbClose').addEventListener('click', closeLb);
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
  </script>
</body>
</html>
