<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art — Ezri Abraham</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .art-feed { max-width: 900px; margin: 0 auto; padding: 0 2.5rem 5rem; }

    .art-year-section { margin-bottom: 1rem; }

    .art-year-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin: 4rem 0 1.75rem;
      opacity: 0;
      transform: translateX(-24px);
      transition: opacity 0.65s ease, transform 0.65s ease;
    }
    .art-year-header.visible { opacity: 1; transform: none; }
    .art-year-num {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 5.5vw, 4.5rem);
      font-weight: 400;
      color: var(--text3);
      letter-spacing: 0.06em;
      line-height: 1;
      flex-shrink: 0;
    }
    .art-year-line { flex: 1; height: 1px; background: var(--border); }

    .art-year-grid { columns: 2 260px; column-gap: 1.1rem; }

    .art-piece {
      break-inside: avoid;
      margin-bottom: 1.1rem;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      background: var(--bg2);
      border: 1px solid var(--border);
      opacity: 0;
      transform: translateY(32px) scale(0.98);
      transition: opacity 0.55s ease, transform 0.55s ease, border-color var(--t), box-shadow var(--t);
      will-change: transform;
    }
    .art-piece.visible { opacity: 1; transform: translateY(0) scale(1); }
    .art-piece:hover { border-color: var(--border2); box-shadow: 0 8px 32px rgba(26,61,143,0.09); }

    .art-piece-img-wrap { overflow: hidden; background: var(--bg3); }
    .art-piece-img-wrap img { width: 100%; display: block; transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94); }
    .art-piece:hover .art-piece-img-wrap img { transform: scale(1.06); }

    .art-piece-geo {
      width: 100%; aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
    }
    .art-piece-geo svg { width: 64px; height: 64px; opacity: 0.12; }

    .art-piece-info { padding: 0.9rem 1.1rem 1rem; }
    .art-piece-title {
      font-family: var(--font-serif);
      font-size: 0.98rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.25rem;
      line-height: 1.3;
    }
    .art-piece-meta {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
    }
    .art-piece-desc {
      font-size: 0.8rem;
      color: var(--text2);
      margin-top: 0.45rem;
      line-height: 1.6;
    }

    /* Lightbox */
    .lightbox { position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.94);display:none;align-items:center;justify-content:center;padding:2rem;cursor:zoom-out; }
    .lightbox.open { display:flex; }
    .lb-inner { position:relative;max-width:90vw;max-height:88vh;display:flex;flex-direction:column;align-items:center;gap:0.75rem;cursor:default; }
    .lb-inner img { max-width:100%;max-height:80vh;object-fit:contain;border-radius:3px; }
    .lb-caption { color:rgba(255,255,255,0.65);font-size:0.82rem;text-align:center; }
    .lb-close { position:fixed;top:1.5rem;right:1.5rem;background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;width:40px;height:40px;border-radius:50%;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.2s; }
    .lb-close:hover { border-color:rgba(255,255,255,0.6); }

    .art-empty { text-align:center;padding:5rem 2rem;color:var(--text3);border:1px dashed var(--border2);border-radius:4px;font-size:0.9rem;line-height:2; }

    @media (max-width: 600px) {
      .art-feed { padding: 0 1.25rem 4rem; }
      .art-year-grid { columns: 1; }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="../index.html" class="nav-logo">Ezri Abraham</a>
    <ul class="nav-links">
      <li><a href="../index.html">About</a></li>
      <li><a href="../science.html">Science</a></li>
      <li><a href="../photos/index.html">Photos</a></li>
      <li><a href="index.html" class="active">Art</a></li>
      <li><a href="../music/index.html">Music</a></li>
    </ul>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24"></svg>
    </button>
  </nav>

  <header class="page-header">
    <span class="page-label">Ezri Abraham</span>
    <h1>Art</h1>
    <p>Making with various mediums.</p>
  </header>

  <div class="art-feed" id="artFeed"></div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Artwork viewer">
    <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
    <div class="lb-inner">
      <img id="lbImg" src="" alt="">
      <div class="lb-caption" id="lbCaption"></div>
    </div>
  </div>

  <footer class="site-footer">
    &copy; Ezri Abraham
  </footer>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/geoanim.js"></script>
  <script>
    /*
    ═══════════════════════════════════════════════════════════
    HOW TO ADD ARTWORK
    ───────────────────────────────────────────────────────────
    Add entries to the PIECES array below.
    Pieces are sorted newest-first and grouped by year.

    Each entry:
      src    — path to image (relative to this file), or omit for a placeholder
      title  — title of the piece
      medium — e.g. "Wood", "Silk dye", "Biodesign"
      year   — four-digit year (number)
      desc   — optional short description (shown below the title)
      alt    — image alt text (defaults to title if omitted)

    Example:
      { src: 'images/cabinet.jpg', title: 'Walnut Cabinet', medium: 'Wood', year: 2024 }
    ═══════════════════════════════════════════════════════════
    */

    const PIECES = [
      // ── add your pieces here ──
      // { src: 'images/example.jpg', title: 'Piece Title', medium: 'Medium', year: 2024, desc: 'Optional description.' },
    ];

    /* ── geo SVG placeholder shapes, cycling per piece ── */
    const GEO = [
      '<svg viewBox="0 0 100 100" fill="none" stroke="var(--accent)" stroke-width="1"><polygon points="50,5 95,27 95,73 50,95 5,73 5,27"/><polygon points="50,22 78,37 78,63 50,78 22,63 22,37"/><circle cx="50" cy="50" r="12"/></svg>',
      '<svg viewBox="0 0 100 100" fill="none" stroke="var(--accent2)" stroke-width="1"><rect x="12" y="12" width="76" height="76" rx="3"/><rect x="26" y="26" width="48" height="48" rx="2"/><rect x="40" y="40" width="20" height="20"/></svg>',
      '<svg viewBox="0 0 100 100" fill="none" stroke="var(--accent)" stroke-width="1"><path d="M50 8 Q80 20 92 50 Q80 80 50 92 Q20 80 8 50 Q20 20 50 8Z"/><ellipse cx="50" cy="50" rx="20" ry="20"/><ellipse cx="50" cy="50" rx="8" ry="8"/></svg>',
      '<svg viewBox="0 0 100 100" fill="none" stroke="var(--accent2)" stroke-width="1"><polygon points="50,10 90,80 10,80"/><polygon points="50,28 74,68 26,68"/></svg>',
    ];

    /* ── build feed ── */
    const feed = document.getElementById('artFeed');

    if (PIECES.length === 0) {
      feed.innerHTML = '<div class="art-empty"><strong>No pieces yet.</strong><br>Open <code>art/index.html</code> and add entries to the <code>PIECES</code> array.</div>';
    } else {
      /* group by year, sort newest first */
      const byYear = {};
      PIECES.forEach(p => { (byYear[p.year] = byYear[p.year] || []).push(p); });
      const years = Object.keys(byYear).map(Number).sort((a, b) => b - a);

      let globalIdx = 0;
      years.forEach(year => {
        const section = document.createElement('div');
        section.className = 'art-year-section';

        const hdr = document.createElement('div');
        hdr.className = 'art-year-header';
        hdr.innerHTML = '<span class="art-year-num">' + year + '</span><div class="art-year-line"></div>';
        section.appendChild(hdr);

        const grid = document.createElement('div');
        grid.className = 'art-year-grid';

        byYear[year].forEach((p, i) => {
          const idx = globalIdx++;
          const card = document.createElement('div');
          card.className = 'art-piece';
          card.style.transitionDelay = (i % 4 * 0.08) + 's';
          card.setAttribute('role', 'button');
          card.setAttribute('tabindex', '0');
          card.setAttribute('aria-label', p.title);

          let imgHtml;
          if (p.src) {
            imgHtml = '<div class="art-piece-img-wrap"><img src="' + p.src + '" alt="' + (p.alt || p.title) + '" loading="lazy"></div>';
          } else {
            imgHtml = '<div class="art-piece-img-wrap"><div class="art-piece-geo">' + GEO[idx % GEO.length] + '</div></div>';
          }

          card.innerHTML = imgHtml +
            '<div class="art-piece-info">' +
            '<div class="art-piece-title">' + p.title + '</div>' +
            '<div class="art-piece-meta">' + p.medium + '</div>' +
            (p.desc ? '<div class="art-piece-desc">' + p.desc + '</div>' : '') +
            '</div>';

          card.addEventListener('click', () => openLb(p));
          card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLb(p); } });
          grid.appendChild(card);
        });

        section.appendChild(grid);
        feed.appendChild(section);
      });

      /* scroll-reveal via IntersectionObserver */
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }
        });
      }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

      document.querySelectorAll('.art-piece, .art-year-header').forEach(el => io.observe(el));

      /* hover tilt effect */
      document.querySelectorAll('.art-piece').forEach(card => {
        card.addEventListener('mousemove', e => {
          const r = card.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width  - 0.5;
          const y = (e.clientY - r.top)  / r.height - 0.5;
          card.style.transform = 'translateY(0) scale(1) rotateX(' + (-y * 7) + 'deg) rotateY(' + (x * 7) + 'deg)';
          card.style.transition = 'opacity 0.55s ease, border-color var(--t), box-shadow var(--t)';
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = '';
          card.style.transition = '';
        });
      });
    }

    /* ── lightbox ── */
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCap = document.getElementById('lbCaption');

    function openLb(p) {
      if (!p.src) return;
      lbImg.src = p.src;
      lbImg.alt = p.alt || p.title;
      lbCap.textContent = [p.title, p.medium, p.year].filter(Boolean).join(' · ');
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLb() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    document.getElementById('lbClose').addEventListener('click', closeLb);
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
  </script>
</body>
</html>
