<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Art — Ezri Abraham</title>
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .art-feed { max-width: 900px; margin: 0 auto; padding: 0 2.5rem 5rem; }

    .art-grid { columns: 2 260px; column-gap: 1.1rem; }

    .art-piece {
      break-inside: avoid;
      margin-bottom: 1.1rem;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      background: var(--bg2);
      border: 1px solid var(--border);
      opacity: 0;
      transform: translateY(32px) scale(0.98);
      transition: opacity 0.55s ease, transform 0.55s ease, border-color var(--t), box-shadow var(--t);
      will-change: transform;
    }
    .art-piece.visible { opacity: 1; transform: translateY(0) scale(1); }
    .art-piece:hover { border-color: var(--border2); box-shadow: 0 8px 32px rgba(26,61,143,0.09); }

    .art-piece-img-wrap { overflow: hidden; background: var(--bg3); position: relative; }
    .art-piece-img-wrap img { width: 100%; display: block; transition: transform 0.7s cubic-bezier(0.25,0.46,0.45,0.94); }
    .art-piece:hover .art-piece-img-wrap img { transform: scale(1.06); }

    /* multi-image badge */
    .img-count {
      position: absolute; top: 0.5rem; right: 0.5rem;
      font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em;
      background: rgba(0,0,0,0.55); color: rgba(255,255,255,0.85);
      padding: 0.18rem 0.45rem; border-radius: 10px;
      pointer-events: none;
    }

    .art-piece-geo {
      width: 100%; aspect-ratio: 4/3;
      display: flex; align-items: center; justify-content: center;
    }
    .art-piece-geo svg { width: 64px; height: 64px; opacity: 0.12; }

    .art-piece-info { padding: 0.9rem 1.1rem 1rem; }
    .art-piece-title {
      font-family: var(--font-serif);
      font-size: 0.98rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.25rem;
      line-height: 1.3;
    }
    .art-piece-meta {
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text3);
    }
    .art-piece-desc {
      font-size: 0.8rem;
      color: var(--text2);
      margin-top: 0.45rem;
      line-height: 1.6;
    }
    .art-piece-links {
      display: flex; flex-wrap: wrap; gap: 0.4rem;
      margin-top: 0.6rem;
    }
    .art-piece-link {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--border2);
      border-radius: 2px;
      padding: 0.2rem 0.5rem;
      text-decoration: none;
      transition: border-color var(--t), background var(--t), color var(--t);
    }
    .art-piece-link:hover { border-color: var(--accent); background: rgba(26,61,143,0.06); }

    /* Lightbox */
    .lightbox { position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.94);display:none;align-items:center;justify-content:center;padding:2rem;cursor:zoom-out; }
    .lightbox.open { display:flex; }
    .lb-inner { position:relative;max-width:90vw;max-height:88vh;display:flex;flex-direction:column;align-items:center;gap:0.75rem;cursor:default; }
    .lb-inner img { max-width:100%;max-height:78vh;object-fit:contain;border-radius:3px; }
    .lb-caption { color:rgba(255,255,255,0.65);font-size:0.82rem;text-align:center; }
    .lb-close { position:fixed;top:1.5rem;right:1.5rem;background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;width:40px;height:40px;border-radius:50%;font-size:1.1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color 0.2s;z-index:1; }
    .lb-close:hover { border-color:rgba(255,255,255,0.6); }
    .lb-nav { display:flex;gap:0.75rem;margin-top:0.25rem; }
    .lb-nav button { background:none;border:1px solid rgba(255,255,255,0.18);color:rgba(255,255,255,0.65);padding:0.3rem 0.9rem;border-radius:2px;cursor:pointer;font-size:0.8rem;transition:border-color 0.2s,color 0.2s; }
    .lb-nav button:hover { border-color:rgba(255,255,255,0.5);color:#fff; }
    .lb-nav button:disabled { opacity:0.2;cursor:default; }
    .lb-counter { font-size:0.7rem;color:rgba(255,255,255,0.4);letter-spacing:0.1em; }

    .art-empty { text-align:center;padding:5rem 2rem;color:var(--text3);border:1px dashed var(--border2);border-radius:4px;font-size:0.9rem;line-height:2; }

    .art-piece-video-wrap { aspect-ratio: 16/9; overflow: hidden; }
    .art-piece-video-wrap iframe { width:100%;height:100%;display:block;border:none; }

    @media (max-width: 600px) {
      .art-feed { padding: 0 1.25rem 4rem; }
      .art-grid { columns: 1; }
    }
  </style>
</head>
<body>
  <nav class="site-nav">
    <a href="../index.html" class="nav-logo">Ezri Abraham</a>
    <ul class="nav-links">
      <li><a href="../index.html">About</a></li>
      <li><a href="../science.html">Science</a></li>
      <li><a href="../photos/index.html">Photos</a></li>
      <li><a href="index.html" class="active">Art</a></li>
      <li><a href="../music/index.html">Music</a></li>
    </ul>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24"></svg>
    </button>
  </nav>

  <header class="page-header">
    <span class="page-label">Ezri Abraham</span>
    <h1>Art</h1>
    <p>Making with various mediums.</p>
  </header>

  <div class="art-feed" id="artFeed"></div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Artwork viewer">
    <button class="lb-close" id="lbClose" aria-label="Close">✕</button>
    <div class="lb-inner">
      <img id="lbImg" src="" alt="">
      <div class="lb-caption" id="lbCaption"></div>
      <div class="lb-nav" id="lbNav" style="display:none;">
        <button id="lbPrev">← Prev</button>
        <span class="lb-counter" id="lbCounter"></span>
        <button id="lbNext">Next →</button>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    &copy; Ezri Abraham
  </footer>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/geoanim.js"></script>
  <script>
    const PIECES = [
      {
        src: 'Art Text_Images/spider_silk.jpg',
        images: ['Art Text_Images/spider_silk.jpg', 'Art Text_Images/spider_image.jpg'],
        title: "Spider's Web on Silk",
        medium: 'Silk & Plant-Based Resist and Ink',
        year: 2026,
        desc: 'After losing my group in a jungle in Zanzibar, I photographed this imperfect spiderweb and later honored its imperfection by tracing each line in resist on silk, following the path of the spider who made it. At an angle, shiny white resist at the vertices creates the illusion of raindrops.',
        alt: "Silk painting of a spider's web traced in resist and ink",
      },
      {
        src: 'Art Text_Images/tunisian_tiles.jpg',
        title: 'Tiles on Silk',
        medium: 'Silk & Plant-Based Resist and Ink',
        year: 2026,
        desc: 'Inspired by Tunisian tiles, each tile was drawn separately and composed before being traced in resist on silk. A lily motif is constant in all four tiles — this piece was a gift for someone who loves lilies.',
        alt: 'Silk painting of Tunisian tile patterns with lily motif',
      },
      {
        src: 'Art Text_Images/squidkid_presentation.jpg',
        video: '0VgPBadKbfo',
        title: 'SquidKid',
        medium: 'Mixed Media + Biology',
        year: 2025,
        desc: 'A bioluminescent bioreactor toy simulating the symbiosis between the Hawaiian bobtail squid and Allivibrio fischerii. I led the biology and consulted on design. Finalist at Biodesign Challenge 2025, presented at MoMA; received "Outstanding Display" among 60+ international teams.',
        alt: 'SquidKid bioluminescent bioreactor toy presentation at MoMA',
        links: [
          { label: 'Northeastern', href: 'https://news.northeastern.edu/2025/11/06/organic-tamagotchi-design-bioluminescent-bacteria/' },
          { label: 'Gizmodo', href: 'https://gizmodo.com/what-if-tamagotchis-were-really-alive-these-researchers-just-made-it-happen-2000683800' },
          { label: 'Newsweek', href: 'https://www.newsweek.com/living-tamagotchi-actually-dies-if-kids-neglect-it-11023121' },
        ],
      },
      {
        src: 'Art Text_Images/tree_of_life_challah_board.jpg',
        title: 'Eitz Chayim ("Tree of Life") Challah Plate',
        medium: 'Wood + Wood Veneer Inlay (Laser Cutting + Woodshop)',
        year: 2025,
        desc: "Inspired by the tree of life in Jewish tradition, created as a gift for my parents' anniversary. Challah is a braided bread eaten each week on Shabbat, the Jewish day of rest.",
        alt: 'Wooden challah plate with tree of life wood veneer inlay',
      },
      {
        src: 'Art Text_Images/Joshi_lab_sign.jpg',
        title: 'Joshi Lab Logo + Sign',
        medium: 'Laser-Cut and -Etched Acrylic',
        year: 2025,
        desc: 'A gift for the Joshi Lab to thank them for their mentorship, inspired by the biology and chemistry that occurs in the lab.',
        alt: 'Laser-cut and etched acrylic sign for the Joshi Lab',
      },
      {
        video: 'l4mI4XTYS5k',
        title: 'The Mini Mini Mummy',
        medium: 'Mixed Media + Arduino',
        year: 2025,
        desc: 'A high-tech mini golf hole on a 2×2 ft board, built for class. Multiple sensors, moving parts, and sound effects.',
      },
    ];

    const GEO = [
      '<svg viewBox="0 0 100 100" fill="none" stroke="var(--accent)" stroke-width="1"><polygon points="50,5 95,27 95,73 50,95 5,73 5,27"/><polygon points="50,22 78,37 78,63 50,78 22,63 22,37"/><circle cx="50" cy="50" r="12"/></svg>',
      '<svg viewBox="0 0 100 100" fill="none" stroke="var(--accent2)" stroke-width="1"><rect x="12" y="12" width="76" height="76" rx="3"/><rect x="26" y="26" width="48" height="48" rx="2"/><rect x="40" y="40" width="20" height="20"/></svg>',
    ];

    /* ── build flat feed ── */
    const feed = document.getElementById('artFeed');
    const grid = document.createElement('div');
    grid.className = 'art-grid';
    feed.appendChild(grid);

    const sorted = [...PIECES].sort((a, b) => b.year - a.year);
    let geoIdx = 0;

    sorted.forEach((p, i) => {
      const imgs = p.images || (p.src ? [p.src] : []);
      const card = document.createElement('div');
      card.className = 'art-piece';
      card.style.transitionDelay = (i % 4 * 0.08) + 's';

      let mediaHtml;
      if (p.video) {
        mediaHtml = '<div class="art-piece-img-wrap art-piece-video-wrap">' +
          '<iframe src="https://www.youtube.com/embed/' + p.video + '" title="' + p.title + '"' +
          ' frameborder="0" allowfullscreen' +
          ' allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">' +
          '</iframe></div>';
      } else if (p.src) {
        mediaHtml = '<div class="art-piece-img-wrap">' +
          '<img src="' + p.src + '" alt="' + (p.alt || p.title) + '" loading="lazy">' +
          (imgs.length > 1 ? '<span class="img-count">1 / ' + imgs.length + '</span>' : '') +
          '</div>';
      } else {
        mediaHtml = '<div class="art-piece-img-wrap"><div class="art-piece-geo">' + GEO[geoIdx++ % GEO.length] + '</div></div>';
      }

      const linksHtml = (p.links && p.links.length)
        ? '<div class="art-piece-links">' + p.links.map(l =>
            '<a class="art-piece-link" href="' + l.href + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + l.label + '</a>'
          ).join('') + '</div>'
        : '';

      card.innerHTML = mediaHtml +
        '<div class="art-piece-info">' +
        '<div class="art-piece-title">' + p.title + ', ' + p.year + '</div>' +
        '<div class="art-piece-meta">' + p.medium + '</div>' +
        (p.desc ? '<div class="art-piece-desc">' + p.desc + '</div>' : '') +
        linksHtml +
        '</div>';

      if (!p.video && imgs.length > 0) {
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label', p.title);
        card.addEventListener('click', () => openLb(p, imgs, 0));
        card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLb(p, imgs, 0); } });
      }

      grid.appendChild(card);
    });

    /* scroll-reveal */
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
    }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
    document.querySelectorAll('.art-piece').forEach(el => io.observe(el));

    /* hover tilt (skip video cards to avoid interfering with iframe) */
    document.querySelectorAll('.art-piece').forEach(card => {
      if (card.querySelector('iframe')) return;
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - 0.5;
        const y = (e.clientY - r.top)  / r.height - 0.5;
        card.style.transform = 'translateY(0) scale(1) rotateX(' + (-y * 7) + 'deg) rotateY(' + (x * 7) + 'deg)';
        card.style.transition = 'opacity 0.55s ease, border-color var(--t), box-shadow var(--t)';
      });
      card.addEventListener('mouseleave', () => { card.style.transform = ''; card.style.transition = ''; });
    });

    /* ── lightbox with multi-image nav ── */
    const lb      = document.getElementById('lightbox');
    const lbImg   = document.getElementById('lbImg');
    const lbCap   = document.getElementById('lbCaption');
    const lbNav   = document.getElementById('lbNav');
    const lbPrev  = document.getElementById('lbPrev');
    const lbNext  = document.getElementById('lbNext');
    const lbCount = document.getElementById('lbCounter');

    let lbImages = [], lbIdx = 0, lbPiece = null;

    function showLbImage(idx) {
      lbIdx = idx;
      lbImg.src = lbImages[idx];
      lbImg.alt = lbPiece ? (lbPiece.alt || lbPiece.title) : '';
      if (lbImages.length > 1) {
        lbNav.style.display = 'flex';
        lbCount.textContent = (idx + 1) + ' / ' + lbImages.length;
        lbPrev.disabled = idx === 0;
        lbNext.disabled = idx === lbImages.length - 1;
      } else {
        lbNav.style.display = 'none';
      }
    }

    function openLb(p, imgs, startIdx) {
      lbPiece  = p;
      lbImages = imgs;
      showLbImage(startIdx);
      lbCap.textContent = [p.title, p.medium, p.year].filter(Boolean).join(' · ');
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLb() { lb.classList.remove('open'); document.body.style.overflow = ''; }

    document.getElementById('lbClose').addEventListener('click', closeLb);
    lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
    lbPrev.addEventListener('click', e => { e.stopPropagation(); if (lbIdx > 0) showLbImage(lbIdx - 1); });
    lbNext.addEventListener('click', e => { e.stopPropagation(); if (lbIdx < lbImages.length - 1) showLbImage(lbIdx + 1); });
    document.addEventListener('keydown', e => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLb();
      if (e.key === 'ArrowLeft'  && lbIdx > 0) showLbImage(lbIdx - 1);
      if (e.key === 'ArrowRight' && lbIdx < lbImages.length - 1) showLbImage(lbIdx + 1);
    });
  </script>
</body>
</html>
